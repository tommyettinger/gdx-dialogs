eclipse.project.name = appName + '-desktop'
sourceSets.main.java.srcDirs = ['src/main/java/']

configurations {
    consumer
}

artifacts {
    consumer(file('proguard.txt'))
}

// Expose consumer ProGuard rules so that fat-JAR / ProGuard users
// automatically pick up the required -keep rules for the reflectively
// loaded DesktopGDXDialogs implementation classes.
task copyProguardRules(type: Copy) {
    from 'proguard.txt'
    into "$buildDir/resources/main/META-INF/proguard"
}
processResources.dependsOn copyProguardRules

dependencies {
    implementation project(':core')
}

tasks.register('runTest', JavaExec) {
    dependsOn testClasses
    mainClass = 'com.mrz07.gdxdialogs.desktop.test.DesktopDialogTest'
    classpath = sourceSets.test.runtimeClasspath
}

ext {
    ARTIFACTID = 'gdx-dialogs-desktop'
}

apply from: '../publish.gradle'
